<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Extractor - Upload</title>
    <style>
      p {
          font-size: 16px;
          color: white;
      }
      div {
          font-family: Arial;
          text-align: center;
          zoom: 1.2;
          background-image: url(image1.jpg);
          background-size: cover;
          height:400px;
      }
      #main{
          color: white;
          width: 300px;
          text-align: center;
          margin-left: 290px;
      }
      #heading{
            color: rgb(187, 245, 254);
      }
      button{
            background-color: black;
            color: white;
            box-shadow: 2px 2px 10px grey;
      }
      button:hover{
            background-color: white;
            color: black;
            box-shadow: 2px 2px 10px yellow;
      }
      #two{
            
      }

      /* ---- Page 2: Upload screen ---- */

      #upload-box{
            height: auto;
            display: inline-block;
            margin-top: 15px;
            padding: 20px 30px;
            border: 2px dashed rgb(187, 245, 254);
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.35);
      }

      #upload-label{
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            color: white;
      }

      #upload-icon{
            font-size: 30px;
            color: rgb(187, 245, 254);
            margin-bottom: 8px;
      }

      #upload-text{
            font-size: 14px;
            color: white;
      }

      #upload-label:hover #upload-text,
      #upload-label:hover #upload-icon{
            color: yellow;
      }

      #file-name{
            font-size: 13px;
            color: rgb(187, 245, 254);
            margin-top: 10px;
            margin-bottom: 0;
      }

      #extract-btn{
            margin-top: 15px;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: Arial;
      }
    </style>
  </head>
  <body>

    <div>
      <div id="two"><br><br>
        <h1 id="main">Upload Your</h1>
        <h1 id="heading">Image or File Here</h1>
        <p>You can upload PDF or images here to get your data structured.</p>

        <div id="upload-box">
          <label for="file-input" id="upload-label">
            <span id="upload-icon">&#8682;</span>
            <span id="upload-text">Choose a file or drag it here</span>
          </label>
          <input type="file" id="file-input" accept=".pdf,image/*" hidden />
          <p id="file-name">No file selected</p>
        </div>

        <button type="button" id="extract-btn">
          Click here to extract your data
        </button>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById('file-input');
      const fileName = document.getElementById('file-name');
      const extractBtn = document.getElementById('extract-btn');

      // Updates file text when selected
      fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
          fileName.textContent = fileInput.files[0].name;
        } else {
          fileName.textContent = 'No file selected';
        }
      });

      // API pipeline submission handler
      extractBtn.addEventListener('click', async () => {
        if (fileInput.files.length === 0) {
          alert("Please select a file first!");
          return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append("file", file);

        // Visual loading state modification
        extractBtn.textContent = "Extracting data... Please wait...";
        extractBtn.disabled = true;

        try {
          // Pointing to your local FastAPI server setup
          const response = await fetch("http://localhost:8000/extract-text", {
            method: "POST",
            body: formData
          });

          const data = await response.json();

          if (data.status === "success") {
            const combinedText = data.text.join("\n");
            
            // Stash extracted text strings safely in browser storage memory
            localStorage.setItem("extractedText", combinedText);
            
            // Trigger redirection over to page 3
            window.location.href = 'page3.html';
          } else {
            alert("Error: " + data.message);
            resetButton();
          }
        } catch (error) {
          console.error(error);
          alert("Could not connect to backend. Make sure your Python app.py server is running!");
          resetButton();
        }
      });

      function resetButton() {
        extractBtn.textContent = "Click here to extract your data";
        extractBtn.disabled = false;
      }
    </script>

  </body>
</html>
